<!DOCTYPE html>
<html>
    <head> 
    <title>Teste 
    </title>
    <style>
    p {
      display: none;
      color: white;
    
    }

     button {
       font-size: 50px;
         }
    h1 {
      color: rgba(12, 221, 244, 0.859);
        font-size: 45px;
    }
    body {
      background-color: rgba(177, 10, 233, 0.859);

    }
    </style>
    </head>

        <body>
        <h1> Mensagem secreta </h1>
        <p id="mensagem"> Eu te amo muito, você é o amor da minha vida </p>
        <button onclick="mostrar()">
          Mostrar 
        </button>
        <br><br>
       

        <script>
        function mostrar() {
          document.getElementById("mensagem").style.display = "block";
          document.getElementById("mensagem").style.fontSize = "50px";
          document.getElementById("mensagem").style.textAlign = "center";
        }

        
        </script>
        
        </body>
</html>
